services:
  postgres:
    image: postgres:16-alpine
    container_name: porkauto-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: porkauto
      POSTGRES_PASSWORD: porkauto
      POSTGRES_DB: porkauto
    volumes:
      - porkauto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porkauto -d porkauto"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  porkauto_pgdata:
